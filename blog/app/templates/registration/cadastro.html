<!-- registration/cadastro.html -->
 {% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/cadastro.css' %}"> <!-- Referência ao seu CSS personalizado -->
</head>
<body>
    <div class="container">
        <h2>Cadastro</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuário</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password1">Senha</label>
                {{ form.password1 }}
            </div>
            <div class="form-group">
                <label for="id_password2">Confirmar Senha</label>
                {{ form.password2 }}
            </div>
            <button type="submit" class="btn btn-primary mt-3">Cadastrar</button>
        </form>
        <p class="mt-3">Já tem uma conta? <a href="{% url 'login' %}">Faça login</a></p>
    </div>
</body>
</html>
