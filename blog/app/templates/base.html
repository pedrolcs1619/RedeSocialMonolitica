{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>

    <!-- Link para o Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
    
    <!-- Seu arquivo CSS personalizado -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar fixada com alinhamento centralizado -->
            <div class="col-md-3 col-lg-2 sidebar d-flex flex-column align-items-center">
                <h2>Menu</h2>
                
                <!-- Foto de perfil centralizada -->
                {% if user.perfil.foto %}
                    <img src="{{ user.perfil.foto.url }}" alt="Foto de perfil" class="rounded-circle mb-3" width="80" height="80">
                {% else %}
                    <img src="{% static 'img/default_profile.png' %}" alt="Sem foto" class="rounded-circle mb-3" width="80" height="80">
                {% endif %}
                
                <p>Bem-vindo, {{ user.username }}!</p>
                
                <!-- Se o usuário estiver logado, mostrar as opções de menu normais -->
                {% if user.is_authenticated %}
                    <a href="{% url 'criar_artigo' %}" class="btn btn-primary mb-3">Criar Novo Post</a>
                    <a href="{% url 'lista_artigos' %}" class="btn btn-secondary mb-3">Feed</a>

                    <!-- Botão Editar Perfil -->
                    <a href="{% url 'editar_perfil' %}" class="btn btn-warning mb-3">Perfil</a>
                    
                    <!-- Logout -->
                    <a href="{% url 'logout' %}" class="btn btn-danger mt-auto">Logout</a>
                {% else %}
                    <!-- Se o usuário não estiver logado, mostrar apenas o botão de login -->
                    <a href="{% url 'login' %}" class="btn btn-primary mb-3">Entrar</a>
                {% endif %}
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- JQuery e Bootstrap JS (isso é necessário para o funcionamento de alguns componentes do Bootstrap) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
